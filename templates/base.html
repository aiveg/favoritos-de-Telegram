<!DOCTYPE html>
<html lang="ru" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Favorites Archive{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v=4">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
</head>
<body>
    <header>
        <nav class="tg-nav">
            <div class="tg-nav-inner">
                <a href="/" class="tg-nav-brand">⭐ Favoritos</a>
                <div class="tg-nav-links">
                    <a href="/">Лента</a>
                    <a href="/stats">Статистика</a>
                    <a href="/rss">RSS</a>
                    <button id="theme-toggle" class="tg-nav-btn" title="Переключить тему">🌓</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <div id="lightbox" class="lightbox" style="display:none" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <div class="lightbox-content" id="lightbox-content"></div>
    </div>

    <button class="scroll-top-btn" id="scroll-top-btn" title="Наверх" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none">⬆</button>

    <script src="/static/app.js"></script>
    <script>
    // Показывать/скрывать кнопку Наверх
    window.addEventListener('scroll', function() {
        var btn = document.getElementById('scroll-top-btn');
        if (btn) btn.style.display = window.scrollY > 500 ? 'flex' : 'none';
    });
    // Копирование текста
    window.copyText = function(btn, text) {
        navigator.clipboard.writeText(text).then(function() {
            btn.textContent = '✅';
            setTimeout(function() { btn.textContent = '📋'; }, 1500);
        }).catch(function() {
            btn.textContent = '❌';
            setTimeout(function() { btn.textContent = '📋'; }, 1500);
        });
    };
    </script>
    <script>
    // Сохраняем позицию скролла при уходе со страницы
    window.addEventListener('beforeunload', function() {
        sessionStorage.setItem('scrollPos', window.scrollY);
        // Сохраняем последний видимый message_id
        var msgs = document.querySelectorAll('.chat-msg-row, .tg-message');
        var lastId = null;
        msgs.forEach(function(el) {
            var rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight && rect.bottom > 0) {
                var dataId = el.getAttribute('data-message-id');
                if (dataId) lastId = dataId;
            }
        });
        if (lastId) sessionStorage.setItem('lastMsgId', lastId);
    });

    // Восстанавливаем скролл при загрузке
    window.addEventListener('load', function() {
        var savedScroll = sessionStorage.getItem('scrollPos');
        if (savedScroll && !window.location.search) {
            window.scrollTo(0, parseInt(savedScroll));
        }
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
